spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3s

toss:
  payments:
    client-key: ${TOSS_CLIENT_KEY}
    secret-key: ${TOSS_SECRET_KEY}

file:
  storage:
    type: local
  upload:
    base-path: /home/gitlab-runner/uploads
    url-prefix: /uploads

logging:
  level:
    com.example.cinema: DEBUG