<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/admin-layout :: layout(
        '상영관 상세', 'screens', ~{::pageCss}, ~{::content}
      )}">

<th:block th:fragment="pageCss">
  <link rel="stylesheet" th:href="@{/css/admin/screen/screen-detail.css}">
</th:block>

<th:block th:fragment="content">

  <!-- ✅ CSRF (fetch에서 읽어서 헤더로 전송) -->
  <meta name="_csrf" th:content="${_csrf.token}">
  <meta name="_csrf_header" th:content="${_csrf.headerName}">

  <!-- 상단 헤더 -->
  <div class="page-head">
    <a class="back-link" th:href="@{/admin/screens}">‹</a>

    <div class="head-title-wrap">
      <h1 class="page-title" th:text="${screen.name}">1관</h1>

      <span class="badge"
            th:classappend="${screen.operating} ? ' badge-on' : ' badge-off'"
            th:text="${screen.operating} ? '운영중' : '미운영'">
        운영중
      </span>
    </div>

    <a class="btn primary head-action"
       th:href="@{/admin/screens/{screenId}/edit(screenId=${screenId})}">
      ✎ 상영관 수정
    </a>
  </div>

  <!-- 상영 타입 칩 -->
  <div class="chip-row">
    <span class="chip"
          th:text="${screen.screeningType != null ? screen.screeningType.displayName : '상영 타입'}">
      2D
    </span>
  </div>

  <!-- 요약 카드 -->
  <section class="summary-grid">
    <div class="summary-card">
      <div class="summary-label">전체 좌석</div>
      <div class="summary-value" th:text="${screen.totalSeats} + '석'">120석</div>
    </div>

    <div class="summary-card summary-card-blue">
      <div class="summary-label">사용 가능</div>
      <div class="summary-value" id="availableSeatsValue"
           th:text="${availableSeats} + '석'">120석</div>
    </div>
  </section>

  <!-- 좌석 관리 툴바 -->
  <section class="seat-card">
    <div class="seat-notice">
      <div class="notice-title">좌석 관리 제약 안내</div>
      <ul class="notice-list">
        <li>좌석 상세 정보는 해당 좌석을 클릭하여 확인할 수 있습니다.</li>
        <li>좌석 비활성화는 해당 상영관의 상영이 없을 경우에만 가능합니다.</li>
      </ul>
    </div>
  </section>

  <!-- 좌석 배치 -->
  <section class="seat-map-card">
    <div class="screen-bar"></div>
    <div class="screen-text">SCREEN</div>

    <div class="seat-wrap" id="seatWrapDetail"></div>

    <!-- ✅ 서버 seats를 JS로 전달 -->
    <script th:inline="javascript">
      window.__SEATS__ = /*[[${screen.seats}]]*/ [];
    </script>

    <div class="seat-legend">
      <div class="legend-item">
        <span class="legend-box on"></span>
        <span>사용 가능</span>
      </div>
      <div class="legend-item">
        <span class="legend-box off"></span>
        <span>사용 불가</span>
      </div>
    </div>
  </section>

  <!-- ✅ 좌석 상세 모달 -->
  <div id="seatDetailModal" class="modal-backdrop" hidden>
    <div class="modal">
      <div class="modal-head">
        <h3>좌석 상세</h3>
        <button type="button" class="modal-close" id="seatModalClose">×</button>
      </div>

      <div class="modal-body">
        <div class="row">
          <span class="label">좌석 ID</span>
          <span id="seatDetailId">-</span>
        </div>
        <div class="row">
          <span class="label">좌석 코드</span>
          <span id="seatDetailCode">-</span>
        </div>

        <div class="row">
          <span class="label">사용 여부</span>
          <select id="seatDetailActiveSelect" class="select">
            <option value="true">사용 가능</option>
            <option value="false">사용 불가</option>
          </select>
        </div>

        <div id="seatModalError" class="modal-error" hidden></div>
      </div>

      <div class="modal-actions">
        <button type="button" class="btn outline" id="seatModalApply">적용</button>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const wrap = document.getElementById('seatWrapDetail');
      if (!wrap) return;

      // ✅ 사용 가능 좌석 숫자 엘리먼트
      const availableEl = document.getElementById('availableSeatsValue');

      /* ===== CSRF utils ===== */
      function getCsrf() {
        const token = document.querySelector('meta[name="_csrf"]')?.getAttribute('content');
        const header = document.querySelector('meta[name="_csrf_header"]')?.getAttribute('content');
        return { token, header };
      }

      function getAvailableCount() {
        if (!availableEl) return null;
        return parseInt((availableEl.textContent || '0').replace(/[^\d]/g, ''), 10) || 0;
      }

      function setAvailableCount(n) {
        if (!availableEl) return;
        availableEl.textContent = `${n}석`;
      }

      /* ===== seats 렌더링 ===== */
      const seats = (window.__SEATS__ || []).slice();

      const rows = seats.length ? Math.max(...seats.map(s => Number(s.rowNo || 0))) : 1;
      const cols = seats.length ? Math.max(...seats.map(s => Number(s.colNo || 0))) : 1;

      wrap.style.setProperty('--rows', String(rows));
      wrap.style.setProperty('--cols', String(cols));

      function toRowLetter(rowNo) {
        return String.fromCharCode('A'.charCodeAt(0) + (rowNo - 1));
      }
      function clear(el) {
        while (el.firstChild) el.removeChild(el.firstChild);
      }

      const seatMap = new Map();
      seats.forEach(s => {
        const r = Number(s.rowNo);
        const c = Number(s.colNo);
        seatMap.set(`${r}-${c}`, {
          id: s.id,
          seatCode: s.seatCode,
          active: !!s.active
        });
      });

      function render() {
        clear(wrap);

        for (let r = 1; r <= rows; r++) {
          const label = document.createElement('div');
          label.className = 'row-label';
          label.style.gridRow = String(r);
          label.style.gridColumn = '1';
          label.textContent = toRowLetter(r);
          wrap.appendChild(label);

          for (let c = 1; c <= cols; c++) {
            const key = `${r}-${c}`;
            const seat = seatMap.get(key);

            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'seat ' + (seat && seat.active ? 'on' : 'off');
            btn.style.gridRow = String(r);
            btn.style.gridColumn = String(c + 1);

            if (seat) {
              btn.dataset.seatId = String(seat.id);
              btn.textContent = seat.active ? seat.seatCode : 'X';
              btn.title = seat.seatCode;
            } else {
              btn.disabled = true;
              btn.classList.add('off');
            }

            wrap.appendChild(btn);
          }
        }
      }

      render();

      /* ===== 모달 ===== */
      const modal = document.getElementById('seatDetailModal');
      const closeBtn = document.getElementById('seatModalClose');
      const applyBtn = document.getElementById('seatModalApply');

      const seatDetailId = document.getElementById('seatDetailId');
      const seatDetailCode = document.getElementById('seatDetailCode');
      const seatActiveSelect = document.getElementById('seatDetailActiveSelect');
      const errorBox = document.getElementById('seatModalError');

      if (!modal || !closeBtn || !applyBtn || !seatDetailId || !seatDetailCode || !seatActiveSelect) return;

      let currentSeatId = null;
      let originalActive = null;

      function openModal() { modal.hidden = false; }
      function closeModal() { modal.hidden = true; }

      function showError(msg) {
        if (!errorBox) return;
        errorBox.hidden = false;
        errorBox.textContent = msg;
      }
      function clearError() {
        if (!errorBox) return;
        errorBox.hidden = true;
        errorBox.textContent = '';
      }

      closeBtn.addEventListener('click', closeModal);
      modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });

      // ✅ 좌석 클릭 → 상세 조회
      wrap.addEventListener('click', async (e) => {
        const btn = e.target.closest('.seat');
        if (!btn || btn.disabled) return;

        const seatId = btn.dataset.seatId;
        if (!seatId) return;

        clearError();

        try {
          const res = await fetch(`/admin/seats/${seatId}`, {
            method: 'GET',
            credentials: 'same-origin'
          });
          if (!res.ok) throw new Error(`좌석 상세 조회 실패 (${res.status})`);

          const data = await res.json();

          currentSeatId = String(data.id);
          originalActive = !!data.active;

          seatDetailId.textContent = data.id ?? '-';
          seatDetailCode.textContent = data.seatCode ?? '-';
          seatActiveSelect.value = originalActive ? 'true' : 'false';

          openModal();
        } catch (err) {
          alert(err.message);
        }
      });

      // ✅ 적용 버튼 → PATCH + CSRF + "사용 가능" 숫자 즉시 갱신
      applyBtn.addEventListener('click', async () => {
        if (!currentSeatId) return;

        clearError();

        const nextActive = (seatActiveSelect.value === 'true');
        if (nextActive === originalActive) {
          closeModal();
          return;
        }

        const beforeActive = originalActive; // ✅ 변경 전 상태
        const afterActive = nextActive;      // ✅ 변경 후(선택값)

        const { token, header } = getCsrf();
        const headers = { 'Content-Type': 'application/json' };
        if (token && header) headers[header] = token;

        try {
          const res = await fetch(`/admin/seats/${currentSeatId}/active`, {
            method: 'PATCH',
            credentials: 'same-origin',
            headers,
            body: JSON.stringify({ active: nextActive })
          });

          if (!res.ok) {
            const text = await res.text().catch(() => '');
            throw new Error(text || `좌석 상태 변경 실패 (${res.status})`);
          }

          const updated = await res.json();
          originalActive = !!updated.active; // 서버 기준

          // ✅ 좌석 버튼 UI 갱신
          const seatBtn = wrap.querySelector(`.seat[data-seat-id="${currentSeatId}"]`);
          if (seatBtn) {
            seatBtn.classList.toggle('on', originalActive);
            seatBtn.classList.toggle('off', !originalActive);
            seatBtn.textContent = originalActive ? updated.seatCode : 'X';
          }

          // ✅ 사용 가능 좌석 수 즉시 갱신 (+1 / -1)
          const currentCount = getAvailableCount();
          if (currentCount !== null) {
            let nextCount = currentCount;

            // 비활성 -> 활성 : +1
            if (beforeActive === false && afterActive === true) nextCount = currentCount + 1;

            // 활성 -> 비활성 : -1
            if (beforeActive === true && afterActive === false) nextCount = currentCount - 1;

            // 안전장치 (음수 방지)
            if (nextCount < 0) nextCount = 0;

            setAvailableCount(nextCount);
          }

          seatActiveSelect.value = originalActive ? 'true' : 'false';
          closeModal();
        } catch (err) {
          showError(err.message);
        }
      });
    })();
  </script>

</th:block>
</html>
