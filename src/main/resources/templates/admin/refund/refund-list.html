<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/admin-layout :: layout(
        '환불 관리', 'refunds', ~{::pageCss}, ~{::content}
      )}">

<head>
    <th:block th:fragment="pageCss">
        <link rel="stylesheet" th:href="@{/css/admin/refund/refund-list.css}">
    </th:block>
</head>

<body>
<th:block th:fragment="content">

    <section class="admin-page">
        <h1 class="page-title">환불 관리</h1>

        <!-- =========================
             검색 / 필터
        ========================= -->
        <form class="filter-box" method="get" th:action="@{/admin/refunds}">

            <!-- 1줄 : 사용자 검색 -->
            <div class="filter-row">
                <input type="text"
                       class="search-input"
                       name="keyword"
                       th:value="${keyword}"
                       placeholder="예약코드 또는 예약자명">

                <button type="submit" class="btn-search">검색</button>

                <!-- ✅ 필터 초기화 -->
                <a th:href="@{/admin/refunds}" class="btn-reset">초기화</a>
            </div>


            <!-- 2줄 : 날짜 -->
            <div class="date-row">
                <input type="date"
                       name="from"
                       th:value="${from}">
                <span class="tilde">~</span>
                <input type="date"
                       name="to"
                       th:value="${to}">
            </div>
        </form>

        <!-- =========================
             리스트 (DTO 기준)
             AdminRefundListResponse:
             id, refundAmount, refundedAt, memberName, reservationCode, movieTitle
        ========================= -->
        <table class="admin-table">
            <thead>
            <tr>
                <th>환불ID</th>
                <th>예매코드</th>
                <th>영화</th>
                <th>회원명</th>
                <th>환불금액</th>
                <th>환불일시</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="r : ${page.content}">
                <td th:text="${r.id}"></td>
                <td th:text="${r.reservationCode}"></td>
                <td th:text="${r.movieTitle}"></td>
                <td th:text="${r.memberName}"></td>

                <td class="amount"
                    th:text="${#numbers.formatInteger(r.refundAmount, 0, 'COMMA') + '원'}"></td>

                <td th:text="${r.refundedAt != null
                    ? #temporals.format(r.refundedAt, 'yyyy-MM-dd HH:mm')
                    : '-'}"></td>
            </tr>

            <tr th:if="${page.content.isEmpty()}">
                <td colspan="6" class="empty">
                    조회된 환불 내역이 없습니다.
                </td>
            </tr>
            </tbody>
        </table>

        <!-- =========================
             페이지네이션 (필터값 유지)
        ========================= -->
        <div class="pagination" th:if="${page.totalPages > 1}">
            <a th:if="${!page.first}"
               th:href="@{/admin/refunds(page=${page.number - 1},
                       size=${page.size},
                       from=${from}, to=${to}, memberId=${memberId})}">‹</a>

            <a th:each="i : ${#numbers.sequence(0, page.totalPages - 1)}"
               th:href="@{/admin/refunds(page=${i},
                       size=${page.size},
                       from=${from}, to=${to}, memberId=${memberId})}"
               th:text="${i + 1}"
               th:classappend="${i == page.number} ? 'active'">
            </a>

            <a th:if="${!page.last}"
               th:href="@{/admin/refunds(page=${page.number + 1},
                       size=${page.size},
                       from=${from}, to=${to}, memberId=${memberId})}">›</a>
        </div>

    </section>

</th:block>
</body>
</html>
