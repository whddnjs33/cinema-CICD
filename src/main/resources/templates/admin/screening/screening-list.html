<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/admin-layout :: layout(
        '상영 관리',
        'screenings',
        ~{::pageCss},
        ~{::content}
      )}">

<!-- ================= Page CSS ================= -->
<th:block th:fragment="pageCss">
    <link rel="stylesheet" th:href="@{/css/admin/screening/screening-list.css}">
</th:block>

<!-- ================= Page Content ================= -->
<th:block th:fragment="content">

    <!-- ================= Header ================= -->
    <div class="content-header">
        <h1>상영 관리</h1>
        <a th:href="@{/admin/screenings/new}" class="btn primary">
            + 상영 등록
        </a>
    </div>

    <!-- ================= 기간 선택 ================= -->
    <section class="card filter-card">
        <div class="filter-header">
            <div class="filter-title">
                <span class="icon">📅</span>
                <span>기간 선택</span>
            </div>

            <form method="get"
                  th:action="@{/admin/screenings}"
                  class="date-range">

                <input type="date"
                       name="startDate"
                       th:value="${search.startDate}"
                       onchange="this.form.submit()">

                <span>~</span>

                <input type="date"
                       name="endDate"
                       th:value="${search.endDate}"
                       onchange="this.form.submit()">

                <!-- 기존 필터 유지 -->
                <input type="hidden" name="page" th:value="${screenings.number}">
                <input type="hidden" name="movieId" th:value="${search.movieId}">
                <input type="hidden" name="screenId" th:value="${search.screenId}">
                <input type="hidden" name="keyword" th:value="${search.keyword}">
            </form>
        </div>
    </section>

    <!-- ================= 영화 필터 ================= -->
    <section class="card filter-card">
        <div class="filter-header">
            <div class="filter-title">
                <span class="icon">🎬</span>
                <span>영화별 필터</span>
            </div>

            <form method="get" th:action="@{/admin/screenings}" class="search-input">
                <input type="text"
                       name="keyword"
                       placeholder="영화 제목 검색"
                       th:value="${search.keyword}">
                <input type="hidden" name="page" th:value="${screenings.number}">
                <input type="hidden" name="startDate" th:value="${search.startDate}">
                <input type="hidden" name="endDate" th:value="${search.endDate}">
                <input type="hidden" name="movieId" th:value="${search.movieId}">
                <input type="hidden" name="screenId" th:value="${search.screenId}">
            </form>
        </div>

        <div class="filter-options">
            <!-- 전체 -->
            <a class="pill"
               th:href="@{/admin/screenings(
                startDate=${search.startDate},
                endDate=${search.endDate},
                screenId=${search.screenId},
                keyword=${search.keyword}
           )}"
               th:classappend="${search.movieId == null} ? 'selected'">
                전체
            </a>

            <!-- 영화 필터 옵션 -->
            <a class="pill"
               th:each="opt : ${movieFilterOptions}"
               th:href="@{/admin/screenings(
                movieId=${opt.movieId},
                startDate=${search.startDate},
                endDate=${search.endDate},
                screenId=${search.screenId},
                keyword=${search.keyword}
           )}"
               th:classappend="${search.movieId != null and search.movieId == opt.movieId} ? 'selected'">
                <span th:text="${opt.movieName}"></span>
            </a>
        </div>
    </section>

    <!-- ================= 상영관 필터 ================= -->
    <section class="card filter-card">
        <div class="filter-header">
            <div class="filter-title">
                <span class="icon">🏢</span>
                <span>상영관별 필터</span>
            </div>
        </div>

        <div class="filter-options">
            <!-- 전체 -->
            <a class="pill"
               th:href="@{/admin/screenings(
                startDate=${search.startDate},
                endDate=${search.endDate},
                movieId=${search.movieId},
                keyword=${search.keyword}
           )}"
               th:classappend="${search.screenId == null} ? 'selected'">
                전체
            </a>

            <!-- 상영관 필터 옵션 -->
            <a class="pill"
               th:each="opt : ${screenFilterOptions}"
               th:href="@{/admin/screenings(
                screenId=${opt.screenId},
                startDate=${search.startDate},
                endDate=${search.endDate},
                movieId=${search.movieId},
                keyword=${search.keyword}
           )}"
               th:classappend="${search.screenId != null and search.screenId == opt.screenId} ? 'selected'">
                <span th:text="${opt.screenName}"></span>
            </a>
        </div>
    </section>

    <!-- ================= Table ================= -->
    <section class="card">
        <table class="admin-table">
            <thead>
            <tr>
                <th>날짜</th>
                <th>시간</th>
                <th>영화</th>
                <th>상영관</th>
                <th>유형</th>
                <th>예약 현황</th>
                <th>상태</th>
                <th></th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="screening : ${screenings.content}">
                <td th:text="${screening.date}"></td>
                <td>
                    <span th:text="${screening.startTime}"></span>
                    ~
                    <span th:text="${screening.endTime}"></span>
                </td>
                <td th:text="${screening.movie.title}"></td>
                <td th:text="${screening.screen.name}"></td>
                <td th:text="${screening.screeningType}"></td>
                <td class="col-seat"
                    th:with="summary=${screening.seatSummary}"
                    th:text="${summary != null and summary.total > 0}
                        ? |${summary.available} / ${summary.total}|
                        : '-'">
                </td>



                <td>
                    <span class="status"
                          th:classappend="${screening.screeningStatus}"
                          th:text="${screening.screeningStatus}">
                    </span>
                </td>
                <td>
                    <a th:href="@{/admin/screenings/{id}(id=${screening.id})}"
                       class="detail-link">→</a>
                </td>
            </tr>

            <tr th:if="${screenings.totalElements == 0}">
                <td colspan="8" class="empty">
                    조회된 상영 회차가 없습니다.
                </td>
            </tr>
            </tbody>
        </table>
    </section>

    <!-- ================= Pagination ================= -->
    <div class="pagination" th:if="${screenings.totalPages > 1}">
        <a th:if="${screenings.hasPrevious()}"
           th:href="@{/admin/screenings(
           page=${screenings.number - 1},
           startDate=${search.startDate},
           endDate=${search.endDate},
           keyword=${search.keyword},
           movieId=${search.movieId},
           screenId=${search.screenId}
       )}">이전</a>

        <a th:each="i : ${#numbers.sequence(1, screenings.totalPages)}"
           th:href="@{/admin/screenings(
           page=${i - 1},
           startDate=${search.startDate},
           endDate=${search.endDate},
           keyword=${search.keyword},
           movieId=${search.movieId},
           screenId=${search.screenId}
       )}"
           th:text="${i}"
           th:classappend="${(i - 1) == screenings.number} ? 'active'"></a>

        <a th:if="${screenings.hasNext()}"
           th:href="@{/admin/screenings(
           page=${screenings.number + 1},
           startDate=${search.startDate},
           endDate=${search.endDate},
           keyword=${search.keyword},
           movieId=${search.movieId},
           screenId=${search.screenId}
       )}">다음</a>
    </div>

</th:block>
</html>
