<!DOCTYPE html>
<html lang="ko" th:replace="~{fragments/admin-layout :: layout(
        '영화 관리', 'movies', ~{::pageCss}, ~{::content}
      )}"
      xmlns:th="http://www.thymeleaf.org">

<!-- ===== 페이지별 CSS ===== -->
<th:block th:fragment="pageCss">
    <link rel="stylesheet" th:href="@{/css/admin/movie/movie-list.css}">
</th:block>

<!-- ===== 페이지 컨텐츠 ===== -->
<th:block th:fragment="content">

    <!-- ===== Header ===== -->
    <div class="page-header">
        <h1>영화 관리</h1>
        <a class="btn primary" th:href="@{/admin/movies/new}">+ 영화 등록</a>
    </div>

    <!-- ================= 검색 / 필터 ================= -->
    <meta name="statuses"
          th:content="${search.statuses != null ? #strings.listJoin(search.statuses, ',') : ''}">

    <meta name="genres"
          th:content="${search.genres != null ? #strings.listJoin(search.genres, ',') : ''}">

    <meta name="ageRatings"
          th:content="${search.ageRatings != null ? #strings.listJoin(search.ageRatings, ',') : ''}">

    <form id="filterForm"
          method="get"
          th:action="@{/admin/movies}"
          th:object="${search}">

        <!-- ===== 검색 / 정렬 / 초기화 ===== -->
        <div class="search-row">
            <input
                    name="keyword"
                    placeholder="영화 제목 검색"
                    th:value="${search.keyword}"
                    type="text"
            >

            <select name="sortType">
                <option
                        th:each="s : ${T(com.elice.cinema.domain.movie.dto.request.AdminMovieSortType).values()}"
                        th:selected="${s.name() == selectedSortType}"
                        th:text="${s.displayName}"
                        th:value="${s.name()}">
                </option>
            </select>

            <button class="btn outline" type="submit">적용</button>
            <button class="btn ghost" id="resetBtn" type="button">초기화</button>
        </div>

        <!-- ===== 상영상태 ===== -->
        <div class="filter-group">
            <label>상영상태</label>
            <div class="filter-options">
                <label class="pill"
                       th:classappend="${search.statuses != null and search.statuses.contains(s)} ? 'selected' : ''"
                       th:each="s : ${T(com.elice.cinema.domain.movie.entity.MovieStatus).values()}">
                    <input class="status-chk"
                           th:value="${s}"
                           type="checkbox">
                    <span th:text="${s.displayName}"></span>
                </label>
            </div>
        </div>

        <!-- ===== 장르 ===== -->
        <div class="filter-group">
            <label>장르</label>
            <div class="filter-options">
                <label class="pill"
                       th:classappend="${search.genres != null and search.genres.contains(g)} ? 'selected' : ''"
                       th:each="g : ${T(com.elice.cinema.domain.movie.entity.Genre).values()}">
                    <input class="genre-chk"
                           th:value="${g}"
                           type="checkbox">
                    <span th:text="${g.displayName}"></span>
                </label>
            </div>
        </div>

        <!-- ===== 관람등급 ===== -->
        <div class="filter-group">
            <label>관람등급</label>
            <div class="filter-options">
                <label class="pill"
                       th:classappend="${search.ageRatings != null and search.ageRatings.contains(a)} ? 'selected' : ''"
                       th:each="a : ${T(com.elice.cinema.domain.movie.entity.AgeRating).values()}">
                    <input class="ageRating-chk"
                           th:value="${a}"
                           type="checkbox">
                    <span th:text="${a.displayName}"></span>
                </label>
            </div>
        </div>

        <!-- ===== 개봉일 기간 ===== -->
        <div class="filter-group">
            <label>기간</label>
            <div>
                <input name="releaseStartDate"
                       th:value="${search.releaseStartDate}"
                       type="date">
                <span>~</span>
                <input name="releaseEndDate"
                       th:value="${search.releaseEndDate}"
                       type="date">
            </div>
        </div>

        <input id="statuses" name="statuses" type="hidden">
        <input id="genres" name="genres" type="hidden">
        <input id="ageRatings" name="ageRatings" type="hidden">
    </form>

    <!-- ================= 영화 목록 ================= -->
    <table class="admin-table">
        <thead>
        <tr>
            <th>번호</th>
            <th>포스터</th>
            <th>제목</th>
            <th>장르</th>
            <th>상태</th>
            <th>관람등급</th>
            <th>개봉일</th>
            <th>종료일</th>
            <th>평점</th>
            <th>예매율</th>
            <th>상세</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="movie, stat : ${moviesPage.content}">
            <td th:text="${movie.id}"></td>
            <!-- 포스터 -->
            <td class="thumbnail-cell">
                <div class="poster-box poster-box--small">
                    <img alt="포스터"
                         th:src="${movie.thumbnail != null
                            ? movie.thumbnail
                            : '/images/default-movie.png'}">
                </div>
            </td>
            <!-- 제목 -->
            <td th:text="${movie.title}"></td>
            <td th:text="${#lists.isEmpty(movie.genres)
                    ? '-'
                    : #strings.listJoin(movie.genres.?[#this != null].![displayName], ', ')}">
            </td>
            <td th:text="${movie.status.displayName}"></td>
            <td th:text="${movie.ageRating.displayName}"></td>
            <td th:text="${movie.releaseDate}"></td>
            <td th:text="${movie.endDate}"></td>
            <td th:text="${movie.avgScore != null ? movie.avgScore : '-'}"></td>
            <td th:text="${movie.advanceReservationRate != null ? movie.advanceReservationRate : '-'}"></td>
            </td>

            <td>
                <a th:href="@{/admin/movies/{id}(id=${movie.id})}">상세</a>
            </td>
        </tr>
        </tbody>
    </table>

    <!-- ================= 페이지네이션 ================= -->
    <div class="pagination">
        <a th:href="@{/admin/movies(
            page=${moviesPage.number - 1},
            keyword=${search.keyword},
            sortType=${search.sortType},
            releaseStartDate=${search.releaseStartDate},
            releaseEndDate=${search.releaseEndDate},
            statuses=${search.statuses},
            genres=${search.genres},
            ageRatings=${search.ageRatings}
        )}"
           th:if="${moviesPage.hasPrevious()}">
            이전
        </a>

        <a th:classappend="${moviesPage.number == i} ? 'active' : ''"
           th:each="i : ${#numbers.sequence(0, moviesPage.totalPages - 1)}"
           th:href="@{/admin/movies(
        page=${i},
        keyword=${search.keyword},
        sortType=${search.sortType},
        releaseStartDate=${search.releaseStartDate},
        releaseEndDate=${search.releaseEndDate},
        statuses=${search.statuses},
        genres=${search.genres},
        ageRatings=${search.ageRatings}
   )}"
           th:text="${i + 1}">
        </a>

        <a th:href="@{/admin/movies(
            page=${moviesPage.number + 1},
            keyword=${search.keyword},
            sortType=${search.sortType},
            releaseStartDate=${search.releaseStartDate},
            releaseEndDate=${search.releaseEndDate},
            statuses=${search.statuses},
            genres=${search.genres},
            ageRatings=${search.ageRatings}
        )}"
           th:if="${moviesPage.hasNext()}">
            다음
        </a>
    </div>

    <script th:src="@{/js/admin/movie-list.js}"></script>

</th:block>
</html>
