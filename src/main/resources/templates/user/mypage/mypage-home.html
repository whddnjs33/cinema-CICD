<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>마이페이지</title>

    <link rel="stylesheet" href="/css/common/reset.css">
    <link rel="stylesheet" href="/css/common/header.css">
    <link rel="stylesheet" href="/css/common/footer.css">
    <link rel="stylesheet" th:href="@{/css/user/mypage/mypage-home.css}">
</head>
<body>

<!-- ✅ 우리 팀 공통 헤더 -->
<header th:replace="~{fragments/header :: header}"></header>

<main class="mypage-container">

    <!-- 상단 인사 영역 -->
    <section class="mypage-greeting">
        <div class="greeting-box">
            <div class="greeting-left">
                <span>안녕하세요,</span>
                <strong th:text="${response.nickname} + '님'">회원님</strong>
            </div>

            <a class="btn-edit-profile" th:href="@{/mypage/profile/edit}">
                개인정보 수정
            </a>
        </div>
    </section>

    <!-- 나의 예매내역 -->
    <section class="mypage-section">
        <div class="mypage-section-box">

            <div class="section-header">
                <h2>나의 예매내역</h2>
                <a class="more-link" th:href="@{/mypage/reservations}">더보기 &gt;</a>
            </div>

            <!-- 예매 없음 -->
            <div class="empty-box" th:if="${#lists.isEmpty(response.reservations)}">
                예매 내역이 없습니다.
            </div>

            <!-- 예매 카드 리스트 -->
            <div class="reservation-list" th:if="${!#lists.isEmpty(response.reservations)}">
                <div class="reservation-card" th:each="reservation : ${response.reservations}">

                    <div class="reservation-info">
                        <h3 th:text="${reservation.movieTitle}">영화 제목</h3>

                        <div class="reservation-rows">
                            <div class="reservation-row">
                                <span class="label">상영일</span>
                                <span class="value" th:text="${#temporals.format(reservation.startAt, 'yyyy.MM.dd')}">
                                    2026.02.01
                                </span>
                            </div>

                            <div class="reservation-row">
                                <span class="label">상영시간</span>
                                <span class="value" th:text="${#temporals.format(reservation.startAt, 'HH:mm')}">
                                    13:00
                                </span>
                            </div>

                            <div class="reservation-row">
                                <span class="label">상영관</span>
                                <span class="value" th:text="${reservation.screenName}">1관</span>
                            </div>

                            <div class="reservation-row">
                                <span class="label">좌석</span>
                                <span class="value"
                                      th:text="${#lists.isEmpty(reservation.seatCodes) ? '-' : #strings.listJoin(reservation.seatCodes, ', ')}">
                                    A1, A2
                                </span>
                            </div>

                            <div class="reservation-row">
                                <span class="label">예매번호</span>
                                <span class="value" th:text="${reservation.reservationCode}">
                                    R-20260201-001
                                </span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </section>

</main>

</body>
</html>
