<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>예매 - 상영 선택</title>

    <link rel="stylesheet" href="/css/common/reset.css">
    <link rel="stylesheet" href="/css/common/header.css">
    <link rel="stylesheet" href="/css/common/footer.css">
    <link rel="stylesheet" th:href="@{/css/user/reservation/reservation-select.css}">
</head>

<body>
<!-- HEADER -->
<div th:replace="fragments/header :: header"></div>

<main class="reservation-page">

    <!-- 페이지 타이틀 -->
    <section class="reservation-title">
        <h2>예매</h2>
        <p>날짜와 영화를 선택해 상영 시간을 확인하세요.</p>
    </section>

    <!-- 예매 선택 레이아웃 -->
    <section class="reservation-layout">

        <!-- ✅ 상단: 날짜 선택 (전체 폭) -->
        <div class="date-section">
            <div class="date-head">
                <h3 class="panel-title">날짜 선택</h3>
            </div>

            <div class="date-tabs-row">
                <button type="button" class="nav-btn" aria-label="이전">‹</button>

                <div class="date-tabs" id="dateTabs">
                    <!-- JS로 오늘~7일 생성 -->
                </div>

                <button type="button" class="nav-btn" aria-label="다음">›</button>
            </div>
        </div>

        <!-- ✅ 하단: 2컬럼 (왼쪽 영화 / 오른쪽 시간표) -->
        <div class="content-grid">

            <!-- 왼쪽: 영화 리스트 -->
            <aside class="movies-panel">
                <div class="panel-head">
                    <h3 class="panel-title">영화</h3>
                    <p class="panel-sub">영화를 선택하세요</p>
                </div>

                <ul class="movie-list" id="movieList">
                    <li class="movie-item"
                        th:each="m : ${movies}"
                        th:data-movie-id="${m.id}">
                        <button type="button" class="movie-btn">
                            <div class="movie-left">
                                <span class="movie-icon">🎞️</span>
                                <div class="movie-text">
                                    <span class="movie-title" th:text="${m.title}">영화 제목</span>
                                    <span class="movie-age" th:text="${m.ageRating.displayName}">12세 이상 관람가</span>
                                </div>
                            </div>
                        </button>
                    </li>
                </ul>
            </aside>

            <!-- 오른쪽: 상영 시간표 -->
            <section class="schedule-panel">
                <div class="panel-head">
                    <h3 class="panel-title">상영 시간표</h3>
                    <p class="panel-sub">모든 상영 시간을 확인하세요</p>
                </div>

                <div class="schedule-body">
                    <ul class="schedule-list" id="scheduleList"></ul>

                    <div class="schedule-empty" id="empty" hidden>
                        해당 날짜에 상영이 없습니다.
                    </div>
                </div>
            </section>

        </div>
    </section>
</main>

<!-- FOOTER -->
<div th:replace="fragments/footer :: footer"></div>

<script src="/js/user/reservation/reservation-select.js"></script>
</body>
</html>
