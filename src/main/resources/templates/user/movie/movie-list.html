<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>영화</title>

    <!-- 공통 -->
    <link rel="stylesheet" href="/css/common/reset.css">
    <link rel="stylesheet" href="/css/common/header.css">
    <link rel="stylesheet" href="/css/common/footer.css">

    <!-- 영화 목록 전용 -->
    <link rel="stylesheet" href="/css/user/movie-list.css">
</head>
<body>

<!-- HEADER (home.html에서 그대로) -->
<div th:replace="fragments/header :: header"></div>

<main class="movie-page">

    <!-- 타이틀 -->
    <section class="movie-title">
        <h2>영화</h2>
        <p>현재 상영 중이거나 개봉 예정인 영화입니다.</p>
    </section>

    <!-- 검색 + 정렬 -->
    <section class="movie-util">
        <div class="movie-count"
             th:text="${moviesPage.totalElements + '개의 영화가 검색되었습니다.'}">
            0개의 영화가 검색되었습니다.
        </div>

        <div class="movie-right">
            <form method="get" th:action="@{/movies}" class="movie-search-form">
                <input type="text"
                       name="keyword"
                       placeholder="영화명 검색"
                       th:value="${keyword}">
                <button type="submit">🔍</button>
            </form>

            <form method="get" th:action="@{/movies}" class="movie-sort-form">
                <!-- 검색어 유지 -->
                <input type="hidden" name="keyword" th:value="${keyword}"/>

                <select name="sort"
                        class="movie-sort"
                        onchange="this.form.submit()">
                    <option value="">정렬</option>
                    <option value="releaseDate"
                            th:selected="${sort == 'releaseDate'}">개봉일순</option>
                    <option value="reservationRate"
                            th:selected="${sort == 'reservationRate'}">예매율순</option>
                </select>
            </form>
        </div>
    </section>

    <!-- 영화 카드 리스트 -->
    <section class="movie-list">
        <div class="movie-card"
             th:each="movie : ${moviesPage.content}">

            <!-- 🔥 포스터 클릭 시 상세 이동 -->
            <a class="poster-link"
               th:href="@{/movies/{movieId}(movieId=${movie.id})}">
                <img class="poster"
                     th:if="${movie.thumbnail != null and movie.thumbnail != ''}"
                     th:src="@{${movie.thumbnail}}"
                     alt="영화 포스터"/>
            </a>

            <div class="info">
                <h3 th:text="${movie.title}">영화 제목</h3>

                <p class="release-date"
                   th:text="'개봉일 ' + ${movie.releaseDate}">
                    개봉일
                </p>

                <strong
                        th:text="|예매율 ${movie.advanceReservationRate != null
        ? movie.advanceReservationRate + '%'
        : '-'}|">
                </strong>
                <!--<div class="meta">
                    <span>평점</span>
                    <strong th:text="${movie.avgScore}">0.0</strong>
                </div>-->

                <!-- 예매 버튼은 그대로 -->
                <a class="reserve-btn"
                   th:href="@{/reservations}">
                    예매하기
                </a>
            </div>

        </div>

    </section>

</main>

<!-- FOOTER (home.html에서 그대로) -->
<div th:replace="fragments/footer :: footer"></div>

</body>
</html>
