<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>안내</title>
    <link rel="stylesheet" href="/css/common/reset.css">

    <style>
        body {
            background-color: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
            Roboto, "Noto Sans KR", sans-serif;
        }

        main {
            max-width: 480px;
            margin: 120px auto;
            padding: 40px 32px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        h2 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 16px;
            color: #111827;
        }

        p {
            font-size: 14px;
            color: #4b5563;
            line-height: 1.6;
        }

        .error-actions {
            margin-top: 28px;
        }

        .error-actions a {
            display: inline-block;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 600;
            color: #ffffff;
            background-color: #111827;
            border-radius: 6px;
            text-decoration: none;
        }

        .error-actions a:hover {
            background-color: #1f2937;
        }
    </style>
</head>
<body>

<main>
    <h2>요청을 처리할 수 없습니다</h2>

    <p th:text="${message}">
        오류가 발생했습니다.
    </p>

    <div class="error-actions">
        <a href="javascript:history.back()">이전 페이지로 돌아가기</a>
    </div>
</main>

</body>
</html>
